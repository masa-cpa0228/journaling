<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 285 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">思考ジャーナル OGP画像</title>
  <desc id="desc">公認会計士・高橋正哉の個人コラムサイト「思考ジャーナル」のSNS共有用画像。</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f1e7"/>
      <stop offset="1" stop-color="#e4d7c3"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#3f3429" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="#efe7da"/>
  <g transform="translate(0 285)">
    <path d="M0 0h1200v630H0z" fill="url(#paper)"/>
    <circle cx="1035" cy="118" r="98" fill="#d1a45f" opacity="0.18"/>
    <circle cx="142" cy="510" r="130" fill="#5d6f64" opacity="0.13"/>

    <g filter="url(#soft-shadow)">
      <rect x="118" y="92" width="964" height="446" rx="22" fill="#fffaf1"/>
      <rect x="118" y="92" width="964" height="446" rx="22" fill="none" stroke="#c7b99e" stroke-width="3"/>
    </g>

    <text x="176" y="184" fill="#77634c" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="34" font-weight="600" letter-spacing="2">Personal Thought Journal</text>
    <text x="176" y="292" fill="#2d2924" font-family="'Hiragino Mincho ProN', 'Yu Mincho', serif" font-size="78" font-weight="700">思考ジャーナル</text>
    <text x="176" y="372" fill="#3f3429" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="34" font-weight="500">会計の外側にある、考え続けるための場所。</text>

    <line x1="176" y1="428" x2="1024" y2="428" stroke="#d8c7ad" stroke-width="2"/>
    <text x="176" y="482" fill="#77634c" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="28" font-weight="500">Masaya Takahashi</text>
    <text x="765" y="482" fill="#77634c" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="28" font-weight="500">AI Trial / Work / Life</text>
  </g>
</svg>
